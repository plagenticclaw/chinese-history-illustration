<rect width="900" height="620" fill="#fbf0dc"/>
<path d="M196 108 C300 45 434 63 546 100 C674 143 769 228 784 337 C799 446 705 538 579 570 C442 604 277 562 190 476 C91 379 83 177 196 108Z" fill="url(#land)" stroke="#8f5c2f" stroke-width="5" filter="url(#shadow)"/>
<path d="M182 270 C270 232 358 248 433 282 C512 318 582 316 681 280" fill="none" stroke="#d6a340" stroke-width="16" stroke-linecap="round" opacity=".85"/><text x="512" y="256" font-family="system-ui, sans-serif" font-size="24" fill="#7a4d20">黃河</text>
<path d="M186 404 C284 430 365 417 457 386 C552 354 648 389 727 430" fill="none" stroke="#3f806b" stroke-width="18" stroke-linecap="round" opacity=".82"/><text x="508" y="430" font-family="system-ui, sans-serif" font-size="24" fill="#2f6656">長江</text>
<g font-family="system-ui, sans-serif" font-weight="700" font-size="20">
<g transform="translate(365 270)"><circle r="15" fill="#c6852d"/><text x="24" y="7" fill="#2a1b13">仰韶</text></g>
<g transform="translate(655 160)"><circle r="15" fill="#8a4fbd"/><text x="24" y="7" fill="#2a1b13">紅山</text></g>
<g transform="translate(655 430)"><circle r="15" fill="#3f806b"/><text x="24" y="7" fill="#2a1b13">良渚</text></g>
<g transform="translate(625 488)"><circle r="15" fill="#5a2d1a"/><text x="24" y="7" fill="#2a1b13">河姆渡</text></g>
