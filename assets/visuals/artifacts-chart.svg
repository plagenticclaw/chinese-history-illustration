<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" role="img" aria-labelledby="title desc"><title id="title">考古證據如何說故事</title><desc id="desc">陶器、玉器、城牆、水利、墓葬五種證據對應古人生活。</desc><rect width="900" height="460" rx="28" fill="#fff4df"/><text x="50" y="60" font-family="system-ui, sans-serif" font-size="32" font-weight="900" fill="#2a1b13">考古證據如何說故事？</text><g font-family="system-ui, sans-serif" font-weight="800" font-size="22" fill="#2a1b13"><g transform="translate(90 130)"><circle r="46" fill="#c6852d"/><path d="M-22 -12 H22 L10 35 H-10Z" fill="#fff8ec"/><text x="80" y="8">陶器 → 飲食、儲存、審美</text></g><g transform="translate(90 205)"><circle r="46" fill="#3f806b"/><rect x="-26" y="-26" width="52" height="52" rx="10" fill="#fff8ec"/><circle r="15" fill="#3f806b"/><text x="80" y="8">玉器 → 身份、信仰、禮儀</text></g><g transform="translate(90 280)"><circle r="46" fill="#8b6238"/><path d="M-30 25 V-15 H30 V25 M-45 25 H45" stroke="#fff8ec" stroke-width="8" fill="none"/><text x="80" y="8">城牆 → 保護、組織、權力</text></g><g transform="translate(90 355)"><circle r="46" fill="#4d8ba8"/><path d="M-34 -4 C-8 -28 8 25 34 0" stroke="#fff8ec" stroke-width="9" fill="none"/><text x="80" y="8">水利 → 合作、工程、管理</text></g></g><g transform="translate(600 155)"><path d="M0 180 C60 30 160 30 220 180Z" fill="#e4c4a0" stroke="#6f3f24" stroke-width="8"/><circle cx="110" cy="104" r="22" fill="#9c352a"/><rect x="78" y="138" width="64" height="34" rx="8" fill="#3f806b"/><text x="110" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#2a1b13">墓葬 → 社會分層</text></g></svg>