<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" aria-labelledby="title desc">
<title id="title">考古線索分類圖</title>
<desc id="desc">以較具辨識度的例子展示仰韶彩陶、良渚玉琮玉璧、龍山黑陶、城牆、水利和墓葬如何提供線索。</desc>
<defs><style><![CDATA[text{font-family:system-ui,'Noto Sans TC',sans-serif}.head{font-weight:900;fill:#2a1b13}.sub{fill:#725b4d;font-weight:650}.line{stroke:#2a1b13;stroke-width:6;stroke-linecap:round;fill:none}]]></style></defs>
<rect width="1000" height="520" rx="28" fill="#fff4df"/>
<text class="head" x="48" y="58" font-size="32">考古線索，不是單一遺址復原圖</text>
<text class="sub" x="48" y="88" font-size="19">器物與遺跡能提供線索；「權力、身份、信仰」仍是根據脈絡提出的解釋。</text>
<g transform="translate(90 150)"><circle r="48" fill="#c6852d"/><path d="M-28 -20 C-18 -40 18 -40 28 -20 L18 34 H-18Z" fill="#fff8ec" stroke="#6f3f24" stroke-width="5"/><path d="M-20 -8 C-5 8 8 -20 24 -2 M-16 15 C0 28 12 4 22 20" stroke="#9c352a" stroke-width="4" fill="none"/><text class="head" x="82" y="-8" font-size="24">仰韶彩陶</text><text class="sub" x="82" y="22" font-size="18">飲食、儲存、審美與手工技術</text></g>
<g transform="translate(90 245)"><circle r="48" fill="#3f806b"/><rect x="-26" y="-28" width="52" height="52" rx="7" fill="#fff8ec"/><circle r="14" fill="#3f806b"/><circle cx="32" cy="26" r="18" fill="none" stroke="#fff8ec" stroke-width="7"/><text class="head" x="82" y="-8" font-size="24">良渚玉琮 / 玉璧</text><text class="sub" x="82" y="22" font-size="18">禮儀、身份、墓葬脈絡中的重要物品</text></g>
<g transform="translate(90 340)"><circle r="48" fill="#221915"/><path d="M-22 -28 C-8 -38 8 -38 22 -28 L12 36 H-12Z" fill="none" stroke="#fff8ec" stroke-width="5"/><path d="M-36 -30 H36" stroke="#fff8ec" stroke-width="4"/><text class="head" x="82" y="-8" font-size="24">龍山蛋殼黑陶</text><text class="sub" x="82" y="22" font-size="18">高超製陶技術與專門化生產線索</text></g>
<g transform="translate(560 150)"><circle r="48" fill="#8b6238"/><path d="M-32 26 V-14 H32 V26 M-50 26 H50" stroke="#fff8ec" stroke-width="8" fill="none"/><text class="head" x="82" y="-8" font-size="24">夯土城牆 / 聚落</text><text class="sub" x="82" y="22" font-size="18">防護、集體勞動與社會組織線索</text></g>
<g transform="translate(560 245)"><circle r="48" fill="#4d8ba8"/><path d="M-36 -5 C-8 -30 8 26 36 0" stroke="#fff8ec" stroke-width="9" fill="none"/><path d="M-32 25 H32" stroke="#fff8ec" stroke-width="6"/><text class="head" x="82" y="-8" font-size="24">水利工程</text><text class="sub" x="82" y="22" font-size="18">環境管理、協作與工程能力線索</text></g>
<g transform="translate(560 340)"><circle r="48" fill="#dbc09c"/><path d="M-30 28 C-12 -22 12 -22 30 28Z" fill="none" stroke="#6f3f24" stroke-width="6"/><circle cx="0" cy="-2" r="10" fill="#9c352a"/><rect x="-18" y="16" width="36" height="16" rx="4" fill="#3f806b"/><text class="head" x="82" y="-8" font-size="24">墓葬差異</text><text class="sub" x="82" y="22" font-size="18">可提示社會分層；不能單靠圖像確定個人身份</text></g>
<rect x="48" y="445" width="904" height="42" rx="14" fill="#fff8ec" stroke="#d8b77f"/><text class="sub" x="66" y="472" font-size="18">孩子讀圖問題：這是直接看到的證據，還是考古學家的合理解釋？</text>
</svg>