<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" role="img" aria-labelledby="title desc">
<title id="title">良渚城市、水利與玉器概念圖</title>
<desc id="desc">簡化概念圖，不是實際遺址平面圖。展示良渚與城市、外圍水利、稻作、墓地/祭壇和玉琮玉璧有關。</desc>
<defs><style><![CDATA[text{font-family:system-ui,'Noto Sans TC',sans-serif}.head{font-weight:900;fill:#2a1b13}.sub{fill:#725b4d;font-weight:650}.water{fill:none;stroke:#3f806b;stroke-linecap:round;opacity:.82}]]></style></defs>
<rect width="1000" height="620" fill="#edf5ef"/>
<text class="head" x="50" y="56" font-size="32">良渚文化：城市、水利、玉器與分層社會</text>
<text class="sub" x="50" y="88" font-size="19">簡化概念圖；不是良渚古城實際平面圖，也不表示所有功能都已完全確定。</text>
<path class="water" d="M56 168 C186 126 278 180 392 151 C515 120 620 156 762 126 C848 108 913 128 960 150" stroke-width="28"/>
<path d="M190 146 H338 M708 127 H858" stroke="#6f3f24" stroke-width="24" stroke-linecap="round"/><text class="head" x="204" y="126" font-size="22">外圍水壩/水利</text>
<path d="M150 202 H830 V480 H150Z" fill="#fff8ec" stroke="#8b6238" stroke-width="18" stroke-dasharray="18 12"/><text class="head" x="174" y="234" font-size="22">城址範圍（概念）</text>
<rect x="310" y="285" width="185" height="108" rx="16" fill="#ead2aa" stroke="#8b6238" stroke-width="6"/><text class="head" x="332" y="348" font-size="24">大型建築/平台</text>
<g transform="translate(610 276)"><ellipse cx="70" cy="58" rx="92" ry="48" fill="#dbc09c" stroke="#8b6238" stroke-width="6"/><circle cx="36" cy="46" r="14" fill="#3f806b"/><circle cx="70" cy="42" r="18" fill="#3f806b"/><circle cx="104" cy="52" r="12" fill="#3f806b"/><text class="head" x="70" y="124" text-anchor="middle" font-size="21">墓地/祭壇線索</text></g>
<g transform="translate(680 420)"><rect x="0" y="0" width="88" height="88" rx="10" fill="#3f806b"/><circle cx="44" cy="44" r="27" fill="#edf5ef"/><circle cx="44" cy="44" r="13" fill="#3f806b"/><path d="M12 18 h64 M12 70 h64 M18 12 v64 M70 12 v64" stroke="#295f50" stroke-width="4" opacity=".55"/><text class="head" x="44" y="124" text-anchor="middle" font-size="22">玉琮</text></g>
<g transform="translate(805 420)"><circle cx="44" cy="44" r="42" fill="#3f806b"/><circle cx="44" cy="44" r="18" fill="#edf5ef"/><text class="head" x="44" y="124" text-anchor="middle" font-size="22">玉璧</text></g>
<g stroke="#7aa361" stroke-width="5"><path d="M188 524 H450 M188 552 H450 M188 580 H450"/><path d="M220 506 V596 M275 506 V596 M330 506 V596 M385 506 V596 M440 506 V596"/></g><text class="head" x="250" y="506" font-size="23">稻田/濕地環境</text>
<rect x="50" y="530" width="900" height="50" rx="15" fill="#fff8ec" stroke="#d8b77f"/><text class="sub" x="70" y="562" font-size="18">準確性提醒：此圖只呈現良渚常見研究重點，不復原某一天、某一座城的完整樣貌。</text>
</svg>