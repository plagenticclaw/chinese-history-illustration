<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" role="img" aria-labelledby="title desc">
<title id="title">三皇五帝傳說符號卡</title>
<desc id="desc">用符號而非肖像表示伏羲、神農、黃帝、堯舜與禹相關傳說：漁網八卦、穀物草藥、祖先部族與治水工具。</desc>
<defs><style><![CDATA[text{font-family:system-ui,'Noto Sans TC',sans-serif}.head{font-weight:900;fill:#2a1b13}.sub{fill:#725b4d;font-weight:650}.card{stroke:#d8b77f;stroke-width:3}.line{stroke:#2a1b13;stroke-width:7;stroke-linecap:round;fill:none}]]></style></defs>
<rect width="1000" height="460" fill="#fff8ec"/>
<text class="head" x="44" y="54" font-size="32">傳說人物：用符號表示，不畫「歷史肖像」</text>
<text class="sub" x="44" y="84" font-size="19">服飾、長相沒有可靠復原依據；下列是故事主題卡，不是人物照片或考古復原圖。</text>
<g transform="translate(130 250)"><rect class="card" x="-94" y="-130" width="188" height="260" rx="28" fill="#f1d3a2"/><circle r="56" fill="#fff8ec"/><path class="line" d="M-42 -42 L42 42 M42 -42 L-42 42 M-58 0 H58 M0 -58 V58"/><circle r="20" fill="none" stroke="#9c352a" stroke-width="7"/><text class="head" y="95" text-anchor="middle" font-size="31">伏羲</text><text class="sub" y="124" text-anchor="middle" font-size="17">漁網 / 八卦傳說</text></g>
<g transform="translate(370 250)"><rect class="card" x="-94" y="-130" width="188" height="260" rx="28" fill="#dce8b6"/><path d="M-48 50 C-35 8 -16 -22 4 -55 M12 50 C20 8 38 -22 58 -50" stroke="#3f806b" stroke-width="9" stroke-linecap="round" fill="none"/><circle cx="-14" cy="-18" r="10" fill="#c6852d"/><circle cx="36" cy="-18" r="10" fill="#c6852d"/><path d="M-50 -30 C-80 -55 -78 -88 -38 -82 C-18 -78 -15 -52 -50 -30Z" fill="#6ca47d"/><path d="M28 -42 C58 -76 92 -60 78 -24 C66 -2 42 -10 28 -42Z" fill="#6ca47d"/><text class="head" y="95" text-anchor="middle" font-size="31">神農</text><text class="sub" y="124" text-anchor="middle" font-size="17">農耕 / 百草傳說</text></g>
<g transform="translate(610 250)"><rect class="card" x="-94" y="-130" width="188" height="260" rx="28" fill="#f4c27d"/><circle r="60" fill="#fff8ec"/><path d="M0 -64 L24 -18 L74 -10 L38 24 L46 72 L0 50 L-46 72 L-38 24 L-74 -10 L-24 -18Z" fill="#9c352a" opacity=".9"/><path d="M-62 0 H62" stroke="#c6852d" stroke-width="8"/><text class="head" y="95" text-anchor="middle" font-size="31">黃帝</text><text class="sub" y="124" text-anchor="middle" font-size="17">祖先 / 部族記憶</text></g>
<g transform="translate(850 250)"><rect class="card" x="-94" y="-130" width="188" height="260" rx="28" fill="#cfe0ec"/><path d="M-62 20 C-26 42 22 42 62 20" stroke="#3f806b" stroke-width="12" fill="none" stroke-linecap="round"/><path d="M-62 -12 C-26 10 22 10 62 -12" stroke="#3f806b" stroke-width="9" fill="none" stroke-linecap="round" opacity=".65"/><path d="M-36 -60 L-8 -30 L-26 -14 M34 -60 L6 -28 L24 -12" stroke="#6f3f24" stroke-width="9" fill="none" stroke-linecap="round"/><text class="head" y="95" text-anchor="middle" font-size="31">堯・舜・禹</text><text class="sub" y="124" text-anchor="middle" font-size="17">德行 / 治水故事</text></g>
</svg>