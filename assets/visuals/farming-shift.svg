<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" role="img" aria-labelledby="title desc">
<title id="title">從採集狩獵到農耕定居的概念圖</title>
<desc id="desc">概念圖，分別示意黃河流域粟黍旱作、長江流域稻作，以及半地穴房屋和干欄式木構房屋。</desc>
<defs><style><![CDATA[text{font-family:system-ui,'Noto Sans TC',sans-serif}.head{font-weight:900;fill:#2a1b13}.sub{fill:#725b4d;font-weight:650}.arrow{fill:#c6852d;font-weight:900}]]></style></defs>
<rect width="1000" height="470" rx="30" fill="#fff4df"/>
<text class="head" x="42" y="55" font-size="30">概念圖：不同地區、很長時間內的生活轉變</text>
<g transform="translate(150 235)"><circle r="92" fill="#f4d09b"/><path d="M72 -18 C20 -46 -30 -35 -68 -4" fill="none" stroke="#6f3f24" stroke-width="10" stroke-linecap="round"/><circle cx="-18" cy="-28" r="17" fill="#8a4f2c"/><path d="M-18 -10 v50 M-48 14 h58 M-8 40 l30 36 M-28 40 l-28 34" stroke="#2a1b13" stroke-width="7" stroke-linecap="round"/><path d="M38 -10 l45 -24" stroke="#2a1b13" stroke-width="6" stroke-linecap="round"/><text class="head" y="132" text-anchor="middle" font-size="25">採集・狩獵・捕魚</text><text class="sub" y="162" text-anchor="middle" font-size="17">不是單一路線，也不是突然改變</text></g>
<text class="arrow" x="286" y="242" font-size="58">→</text>
<g transform="translate(500 235)"><circle r="100" fill="#dce8b6"/><g transform="translate(-48 -6)"><text class="head" y="-62" text-anchor="middle" font-size="19">黃河：粟/黍旱作</text><path d="M-40 44 C-20 8 8 2 42 44" fill="none" stroke="#7b9a41" stroke-width="9"/><path d="M-24 36 C-24 2 -18 -24 -6 -48 M8 38 C12 8 18 -20 32 -42" stroke="#7b9a41" stroke-width="6" stroke-linecap="round"/><circle cx="-12" cy="-18" r="7" fill="#c6852d"/><circle cx="25" cy="-16" r="7" fill="#c6852d"/></g><g transform="translate(54 18)"><text class="head" y="-72" text-anchor="middle" font-size="19">長江：稻作濕地</text><path d="M-44 45 H46" stroke="#3f806b" stroke-width="7"/><path d="M-32 34 C-26 8 -16 -18 -4 -44 M8 35 C15 8 24 -18 40 -38" stroke="#3f806b" stroke-width="6" stroke-linecap="round"/></g><text class="head" y="132" text-anchor="middle" font-size="25">農耕增加</text><text class="sub" y="162" text-anchor="middle" font-size="17">各地作物與環境不同</text></g>
<text class="arrow" x="641" y="242" font-size="58">→</text>
<g transform="translate(835 235)"><circle r="104" fill="#ecd0bd"/><g transform="translate(-44 12)"><path d="M-48 30 C-18 -12 22 -12 52 30 H-48Z" fill="#b87545" stroke="#6f3f24" stroke-width="6"/><rect x="-26" y="8" width="24" height="22" fill="#fff4df"/><text class="sub" x="0" y="65" text-anchor="middle" font-size="16">半地穴房屋</text></g><g transform="translate(54 -2)"><path d="M-44 20 L0 -22 L44 20Z" fill="#fff8ec" stroke="#6f3f24" stroke-width="6"/><rect x="-34" y="20" width="68" height="28" fill="#c6852d"/><path d="M-26 48 v32 M24 48 v32" stroke="#6f3f24" stroke-width="6"/><text class="sub" x="0" y="104" text-anchor="middle" font-size="16">干欄式木構</text></g><text class="head" y="142" text-anchor="middle" font-size="25">定居村落</text><text class="sub" y="172" text-anchor="middle" font-size="17">房屋形式依地區而異</text></g>
</svg>